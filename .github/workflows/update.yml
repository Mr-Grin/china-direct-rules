name: Update China direct-connect ruleset

on:
  schedule:
    # 21:30 UTC = 05:30 Beijing time, a few hours after upstream's own daily refresh
    - cron: "30 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build merged ruleset
        run: python3 scripts/build_rules.py

      - name: Discard timestamp-only changes
        run: |
          for f in rules/shadowrocket.list rules/surge.list rules/loon.list rules/quantumultx.list rules/clash.yaml; do
            if git diff --quiet -- "$f"; then
              continue
            fi
            if diff -q \
                <(git show "HEAD:$f" | grep -v '^# UPDATED:') \
                <(grep -v '^# UPDATED:' "$f") > /dev/null; then
              git checkout -- "$f"
            fi
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/shadowrocket.list rules/shadowrocket.sgmodule rules/surge.list rules/loon.list rules/quantumultx.list rules/clash.yaml README.md
          if git diff --cached --quiet; then
            echo "No rule changes, skipping commit"
          else
            git commit -m "chore: update rulesets $(date -u +%Y-%m-%d)"
            git push
          fi
